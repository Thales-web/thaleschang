[dev]
  command = "pnpm dev"
  framework = "astro"

[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions/"

# [[redirects]]
#   from = "/api/*" # simplify all calls to serverless functions
#   to = "/.netlify/functions/:splat" # all function calls will go to this path
#   status = 200 # ok code
#   force = true # ensure to always redirect

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://wcs.naver.net https://t1.daumcdn.net https://www.clarity.ms https://t1.kakaocdn.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://www.clarity.ms https://wcs.naver.net https://region1.google-analytics.com; frame-src 'self' https://www.youtube.com; object-src 'none'; base-uri 'self'"